---
name: Build and release to WordPress.org

on:
  release:
    types: [published]

jobs:
  build-and-release:
    name: Build and deploy to WordPress.org
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Notify on start
        run: |
          echo "Starting release process for tag $RELEASE_TAG..."  
          echo "This may take a few minutes. Please wait."

      - name: Normalize release tag
        shell: bash
        run: |
          VERSION=${RELEASE_TAG#v}
          VERSION=${VERSION#V}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Show release version
        run: echo "VERSION=${VERSION}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check version numbers
        run: |
          chmod +x .github/workflows/scripts/version-checker.sh
          ./.github/workflows/scripts/version-checker.sh

      - name: Install SVN
        run: |
          sudo apt-get update  
          sudo apt-get install -y subversion  

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer, wp-cli

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Node modules
        run: npm ci

      - name: Build
        run: npm run build

      # This step generates a additional-authors.zip file in the root of the repository, we should delete it after uploading it as an artifact to avoid confusion.
      - name: Pack plugin
        id: pack_plugin
        run: npm run pack

      - name: Upload release asset
        id: upload_release_asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./additional-authors.zip
          asset_name: additional-authors.zip
          asset_content_type: application/zip

      - name: Cleanup packaged artifact
        if: always()
        run: rm -f ./additional-authors.zip

      - name: Checkout WordPress SVN repository
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        run: svn checkout "https://plugins.svn.wordpress.org/additional-authors" svn --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --no-auth-cache --non-interactive --trust-server-cert

      - name: Prepare SVN & commit
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        run: |
          ls -la
          cd svn
          ls -la
          VERSION=${VERSION}
          mkdir -p trunk tags/$VERSION
          rsync -aL --delete \
          --exclude='svn/' \
          --exclude='.git/' \
          --exclude='.github/' \
          --exclude='bin/' \
          --exclude='node_modules/' \
          --exclude='resource/' \
          --exclude='src/' \
          --exclude='.gitignore' \
          --exclude='.wp-env.json' \
          --exclude='package-lock.json' \
          --exclude='package.json' \
          --exclude='README.md' \
          --exclude='webpack.config.js' \
          --exclude='*.zip' \
          ../ ./trunk/
          rsync -aL --delete trunk/ "tags/$VERSION/"
          svn add --force . || true
          svn status | awk '/^!/{print $2}' | while IFS= read -r file; do
            [ -n "$file" ] || continue
            svn rm "$file" || true
          done
          svn status
          svn commit -m "Release version $VERSION" --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --no-auth-cache --non-interactive --trust-server-cert

      - name: Cleanup SVN checkout
        if: always()
        run: rm -rf svn

      - name: Notify on success
        if: success()
        run: |
         echo "Plugin successfully deployed to WordPress.org and GitHub!"  
         echo "Version ${RELEASE_TAG} is now live!"
